<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizza Paradise - Access Your Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #d32f2f;
            --primary-hover: #b71c1c;
            --accent: #ffb300;
            --accent-hover: #ffa000;
            --dark-bg: #121212;
            --dark-card: #1e1e1e;
            --light-bg: #f8f9fa;
            --light-card: #ffffff;
            --text-light: #212529;
            --text-muted: #6c757d;
            --border-color: #e0e0e0;
            --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--light-bg);
            color: var(--text-light);
            transition: var(--transition);
            line-height: 1.5;
        }

        /* Top Navigation Header */
        header {
            background: var(--primary);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-container {
            width: 100%;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 6px;
            overflow-x: auto;
            overflow-y: hidden;
            width: 100%;
            padding-bottom: 4px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        nav ul::-webkit-scrollbar {
            display: none;
        }

        nav ul li {
            flex: 0 0 auto;
        }

        nav ul li a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 700;
            font-size: 14px;
            transition: var(--transition);
            padding: 6px 12px;
            border-radius: 20px;
            display: block;
            white-space: nowrap;
        }

        nav ul li a:hover, nav ul li a.active {
            color: white;
            background: rgba(255, 255, 255, 0.2);
        }

        /* Language Toggle Module */
        .lang-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            min-height: 36px;
            display: flex;
            align-items: center;
            transition: var(--transition);
        }

        .lang-btn:hover {
            background: white;
            color: var(--primary);
        }

        /* Hero Splash Header */
        .hero {
            height: 20vh;
            min-height: 140px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('https://images.unsplash.com/photo-1513104890138-7c749659a591');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 0 16px;
        }

        .hero h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Login Center Frame */
        .login-container {
            width: 100%;
            margin: 24px auto;
            padding: 0 16px;
            display: flex;
            justify-content: center;
        }

        .login-box {
            background: var(--light-card);
            padding: 28px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.05);
            transition: var(--transition);
            width: 100%;
            max-width: 480px;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 24px;
            color: var(--primary);
            font-size: 24px;
            font-weight: 800;
        }

        /* Form Controls and Inputs */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--light-bg);
            color: var(--text-light);
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            transition: var(--transition);
            outline: none;
            min-height: 44px; /* Essential touch target dimension */
        }

        .form-group input:focus {
            border-color: var(--primary);
            background-color: var(--light-card);
            box-shadow: 0 0 0 4px rgba(211, 47, 47, 0.1);
        }

        /* Checkbox Option Elements */
        .checkbox {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            user-select: none;
        }

        .checkbox input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
            cursor: pointer;
            flex-shrink: 0;
        }

        .checkbox label {
            font-size: 14.5px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            line-height: 1.2;
        }

        /* Action Buttons Matrix */
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            margin-top: 16px;
            min-height: 48px;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.2);
        }

        .btn:active {
            background: var(--primary-hover);
            transform: scale(0.98);
        }

        .extra {
            text-align: center;
            margin-top: 20px;
        }

        .extra a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            font-size: 14.5px;
            transition: var(--transition);
            display: inline-block;
            padding: 6px;
        }

        .extra a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        /* System Interface Theme Controls */
        .controls {
            text-align: center;
            background: #161616;
            padding: 30px 16px;
            margin-top: 40px;
        }

        .mode-btn {
            background: transparent;
            color: #aaa;
            border: 1px solid #333;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            min-height: 44px;
            transition: var(--transition);
            width: 100%;
            max-width: 250px;
        }

        footer {
            background: #0b0b0b;
            color: #aaa;
            text-align: center;
            padding: 30px 16px;
            border-top: 1px solid #1f1f1f;
        }

        footer h3 {
            color: white;
            margin-bottom: 8px;
            font-size: 18px;
        }

        footer p {
            font-size: 12px;
            line-height: 1.4;
        }

        /* Native Dark Mode Settings */
        body.dark {
            background: var(--dark-bg);
            color: #f8f9fa;
            --border-color: #333;
        }

        body.dark .login-box {
            background: var(--dark-card);
            border-color: rgba(255,255,255,0.05);
        }

        body.dark .form-group input {
            background-color: #161616;
            color: white;
        }

        body.dark .form-group input:focus {
            background-color: var(--dark-card);
        }

        body.dark .checkbox label {
            color: #aaa;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="nav-top">
            <a href="index.html" class="logo">🍕 Pizza Paradise</a>
            <button class="lang-btn" onclick="toggleLanguage()">Shqip</button>
        </div>
        <div class="nav-container">
            <ul>
                <li><a href="index.html" data-key="nav-home">Home</a></li>
                <li><a href="about.html" data-key="nav-about">About</a></li>
                <li><a href="menu.html" data-key="nav-menu">Menu</a></li>
                <li><a href="offers.html" data-key="nav-offers">Offers</a></li>
                <li><a href="location.html" data-key="nav-location">Location</a></li>
                <li><a href="contact.html" data-key="nav-contact">Contact</a></li>
                <li><a href="login.html" class="active" data-key="nav-login">Login</a></li>
                <li><a href="order.html" data-key="nav-order">Order</a></li>
            </ul>
        </div>
    </nav>
</header>

<section class="hero">
    <h1 data-key="hero-heading">Login</h1>
</section>

<div class="login-container">
    <div class="login-box">
        <h2 data-key="box-title">Customer Login</h2>

        <div class="form-group">
            <label data-key="lbl-email">Email Address</label>
            <input type="email" id="email" placeholder="Enter Email" data-placeholder="place-email">
        </div>

        <div class="form-group">
            <label data-key="lbl-password">Password</label>
            <input type="password" id="password" placeholder="Enter Password" data-placeholder="place-pass">
        </div>

        <div class="checkbox">
            <input type="checkbox" id="show-pass-check" onclick="togglePassword()">
            <label id="lbl-show-pass" for="show-pass-check" data-key="opt-show">Show Password</label>
        </div>

        <div class="checkbox">
            <input type="checkbox" id="remember">
            <label id="lbl-remember" for="remember" data-key="opt-remember">Remember Me</label>
        </div>

        <button class="btn" onclick="loginUser()" data-key="btn-login">Login</button>

        <div class="extra">
            <a href="#" onclick="forgotPassword()" data-key="link-forgot">Forgot Password?</a>
        </div>
    </div>
</div>

<div class="controls">
    <button class="mode-btn" onclick="toggleDarkMode()" data-key="dark-btn">Toggle Dark Mode</button>
</div>

<footer>
    <h3>Pizza Paradise © 2026</h3>
    <p data-key="footer-desc">Fresh Pizza • Fast Delivery • Customer Satisfaction</p>
</footer>

<script>
    // System Wide Localized Translation Matrix
    const translations = {
        en: {
            "nav-home": "Home",
            "nav-about": "About",
            "nav-menu": "Menu",
            "nav-offers": "Offers",
            "nav-location": "Location",
            "nav-contact": "Contact",
            "nav-login": "Login",
            "nav-order": "Order",
            "hero-heading": "Login",
            "box-title": "Customer Login",
            "lbl-email": "Email Address",
            "lbl-password": "Password",
            "opt-show": "Show Password",
            "opt-remember": "Remember Me",
            "btn-login": "Login",
            "link-forgot": "Forgot Password?",
            "dark-btn": "Toggle Dark Mode",
            "footer-desc": "Fresh Pizza • Fast Delivery • Customer Satisfaction",
            "place-email": "Enter Email",
            "place-pass": "Enter Password",
            "err-empty": "Please fill all fields.",
            "err-length": "Password must be at least 6 characters.",
            "success-login": "Login Successful!\nWelcome to Pizza Paradise.",
            "success-reset": "Password reset link sent to your email."
        },
        sq: {
            "nav-home": "Ballina",
            "nav-about": "Rreth Nesh",
            "nav-menu": "Menuja",
            "nav-offers": "Ofertat",
            "nav-location": "Lokacioni",
            "nav-contact": "Kontakt",
            "nav-login": "Kyçuni",
            "nav-order": "Porosit",
            "hero-heading": "Kyçuni",
            "box-title": "Identifikimi i Klientit",
            "lbl-email": "Adresa Email",
            "lbl-password": "Fjalëkalimi",
            "opt-show": "Shfaq Fjalëkalimin",
            "opt-remember": "Më Kujto",
            "btn-login": "Kyçu",
            "link-forgot": "Keni harruar fjalëkalimin?",
            "dark-btn": "Ndrysho Pamjen",
            "footer-desc": "Pica e Freskët • Dërgesë e Shpejtë • Kënaqësia e Klientit",
            "place-email": "Shkruani Email-in",
            "place-pass": "Shkruani Fjalëkalimin",
            "err-empty": "Ju lutem plotësoni të gjitha fushat.",
            "err-length": "Fjalëkalimi duhet të jetë të paktën 6 karaktere.",
            "success-login": "Kyçja u krye me sukses!\nMirëseerdhët në Pizza Paradise.",
            "success-reset": "Linku për rivendosjen e fjalëkalimit u dërgua në email-in tuaj."
        }
    };

    let currentLang = 'en';

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'sq' : 'en';
        document.querySelector('.lang-btn').textContent = currentLang === 'en' ? 'Shqip' : 'English';
        document.documentElement.lang = currentLang;
        
        // Translate text elements
        document.querySelectorAll('[data-key]').forEach(elem => {
            const key = elem.getAttribute('data-key');
            if (translations[currentLang][key]) {
                elem.textContent = translations[currentLang][key];
            }
        });

        // Translate placeholders
        document.querySelectorAll('[data-placeholder]').forEach(elem => {
            const key = elem.getAttribute('data-placeholder');
            if (translations[currentLang][key]) {
                elem.placeholder = translations[currentLang][key];
            }
        });
    }

    function loginUser() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (email === "" || password === "") {
            alert(translations[currentLang]["err-empty"]);
            return;
        }

        if (password.length < 6) {
            alert(translations[currentLang]["err-length"]);
            return;
        }

        alert(translations[currentLang]["success-login"]);
    }

    function togglePassword() {
        const passInput = document.getElementById("password");
        if (passInput.type === "password") {
            passInput.type = "text";
        } else {
            passInput.type = "password";
        }
    }

    function forgotPassword() {
        alert(translations[currentLang]["success-reset"]);
    }

    function toggleDarkMode() {
        document.body.classList.toggle("dark");
    }
</script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c62828">
</body>
</html>

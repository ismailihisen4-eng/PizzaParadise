<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizza Paradise - Our Premium Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #d32f2f;
            --primary-hover: #b71c1c;
            --accent: #ffb300;
            --accent-hover: #ffa000;
            --dark-bg: #121212;
            --dark-card: #1e1e1e;
            --light-bg: #f8f9fa;
            --light-card: #ffffff;
            --text-light: #212529;
            --text-muted: #6c757d;
            --border-color: #e0e0e0;
            --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--light-bg);
            color: var(--text-light);
            transition: var(--transition);
            line-height: 1.5;
            padding-bottom: 80px;
        }

        header {
            background: var(--primary);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-container {
            width: 100%;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 6px;
            overflow-x: auto;
            overflow-y: hidden;
            width: 100%;
            padding-bottom: 4px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        nav ul::-webkit-scrollbar {
            display: none;
        }

        nav ul li {
            flex: 0 0 auto;
        }

        nav ul li a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 700;
            font-size: 14px;
            transition: var(--transition);
            padding: 6px 12px;
            border-radius: 20px;
            display: block;
            white-space: nowrap;
        }

        nav ul li a:hover, nav ul li a.active {
            color: white;
            background: rgba(255, 255, 255, 0.2);
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            min-height: 36px;
            display: flex;
            align-items: center;
            transition: var(--transition);
        }

        .lang-btn:hover {
            background: white;
            color: var(--primary);
        }

        .hero {
            height: 20vh;
            min-height: 140px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('https://images.unsplash.com/photo-1513104890138-7c749659a591');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 0 16px;
        }

        .hero h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .filter-container {
            display: flex;
            gap: 8px;
            margin: 16px 0;
            overflow-x: auto;
            padding: 4px 16px;
            width: 100%;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .filter-container::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            flex: 0 0 auto;
            padding: 10px 20px;
            border: 2px solid var(--border-color);
            background: var(--light-card);
            color: var(--text-light);
            border-radius: 25px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            min-height: 44px;
            transition: var(--transition);
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(211, 47, 47, 0.15);
        }

        .container {
            width: 100%;
            padding: 0 16px;
            margin-bottom: 40px;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .menu-card {
            background: var(--light-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.05);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .menu-img {
            height: 180px;
            width: 100%;
            object-fit: cover;
            background: #eee;
        }

        .menu-info {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .menu-info h3 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 6px;
            color: var(--text-light);
        }

        body.dark .menu-info h3 {
            color: #fff;
        }

        .menu-desc {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            flex-grow: 1;
            line-height: 1.4;
        }

        .menu-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .menu-price {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 22px;
            font-weight: 700;
            cursor: pointer;
            min-height: 44px;
            font-size: 13px;
            transition: var(--transition);
        }

        .add-btn:active {
            transform: scale(0.97);
            background: var(--primary-hover);
        }

        .basket-indicator {
            position: fixed;
            bottom: 16px;
            right: 16px;
            left: 16px;
            background: var(--accent);
            color: #000;
            padding: 14px;
            border-radius: 12px;
            font-weight: 800;
            box-shadow: 0 8px 20px rgba(255, 179, 0, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 999;
            text-decoration: none;
            font-size: 15px;
            transition: var(--transition);
        }

        .basket-indicator:active {
            transform: scale(0.98);
            background: var(--accent-hover);
        }

        .controls {
            text-align: center;
            background: #161616;
            padding: 30px 16px;
            margin-top: 40px;
        }

        .mode-btn {
            background: transparent;
            color: #aaa;
            border: 1px solid #333;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            min-height: 44px;
            transition: var(--transition);
            width: 100%;
            max-width: 250px;
        }

        footer {
            background: #0b0b0b;
            color: #aaa;
            text-align: center;
            padding: 30px 16px;
            border-top: 1px solid #1f1f1f;
        }

        footer h3 {
            color: white;
            margin-bottom: 8px;
            font-size: 18px;
        }

        footer p {
            font-size: 12px;
            line-height: 1.4;
        }

        body.dark {
            background: var(--dark-bg);
            color: #f8f9fa;
            --border-color: #333;
        }

        body.dark .menu-card {
            background: var(--dark-card);
            border-color: rgba(255,255,255,0.05);
        }

        body.dark .filter-btn {
            color: #f8f9fa;
            background: var(--dark-card);
        }

        body.dark .filter-btn:hover, body.dark .filter-btn.active {
            color: white;
            background: var(--primary);
        }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="nav-top">
            <a href="index.html" class="logo">🍕 Pizza Paradise</a>
            <button class="lang-btn" onclick="toggleLanguage()">Shqip</button>
        </div>
        <div class="nav-container">
            <ul>
                <li><a href="index.html" data-key="nav-home">Home</a></li>
                <li><a href="about.html" data-key="nav-about">About</a></li>
                <li><a href="menu.html" class="active" data-key="nav-menu">Menu</a></li>
                <li><a href="offers.html" data-key="nav-offers">Offers</a></li>
                <li><a href="location.html" data-key="nav-location">Location</a></li>
                <li><a href="contact.html" data-key="nav-contact">Contact</a></li>
                <li><a href="login.html" data-key="nav-login">Login</a></li>
                <li><a href="order.html" data-key="nav-order">Order</a></li>
            </ul>
        </div>
    </nav>
</header>

<section class="hero">
    <h1 data-key="hero-heading">Our Premium Menu</h1>
</section>

<div class="filter-container">
    <button class="filter-btn active" onclick="filterCategory(event, 'all')" data-key="cat-all">All Items</button>
    <button class="filter-btn" onclick="filterCategory(event, 'pizza')" data-key="cat-pizzas">Pizzas</button>
    <button class="filter-btn" onclick="filterCategory(event, 'side')" data-key="cat-sides">Sides</button>
    <button class="filter-btn" onclick="filterCategory(event, 'drink')" data-key="cat-drinks">Drinks</button>
</div>

<div class="container">
    <div class="menu-grid" id="menu-wrapper"></div>
</div>

<a href="order.html" class="basket-indicator">
    🛒 <span data-key="float-basket">Basket:</span> <span id="cart-counter">0</span>
</a>

<div class="controls">
    <button class="mode-btn" onclick="toggleDarkMode()" data-key="dark-btn">Toggle Dark Mode</button>
</div>

<footer>
    <h3>Pizza Paradise © 2026</h3>
    <p data-key="footer-desc">Fresh Ingredients • Artisan Recipes • Fast Hot Delivery</p>
</footer>

<script>
    const menuData = [
        {
            id: 1,
            category: "pizza",
            price: 10.00,
            img: "https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=500",
            en: { name: "Cheese Pizza", desc: "Classic mozzarella cheese and authentic signature house tomato basil reduction spread." },
            sq: { name: "Picë me Djathë", desc: "Djathë mocarela klasik dhe salcë domatesh autentike e shtëpisë me borzilok." }
        },
        {
            id: 2,
            category: "pizza",
            price: 12.00,
            img: "https://images.unsplash.com/photo-1628840042765-356cda07504e?w=500",
            en: { name: "Pepperoni Pizza", desc: "Crispy, spicy traditional dry cured Italian pepperoni slices with premium mozzarella layer." },
            sq: { name: "Picë Peperoni", desc: "Fetë të krokante dhe pikante peperoni tradicional italian me shtresë mocarela premium." }
        },
        {
            id: 3,
            category: "pizza",
            price: 15.00,
            img: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=500",
            en: { name: "BBQ Chicken Pizza", desc: "Tender grilled chicken pieces tossed in tangy smokey BBQ glaze with sweet red onions." },
            sq: { name: "Picë BBQ me Pulë", desc: "Copëza pule të buta në skarë të përziera me salcë BBQ tymuese dhe qepë të kuqe." }
        },
        {
            id: 4,
            category: "pizza",
            price: 14.00,
            img: "https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=500",
            en: { name: "Hawaiian Pizza", desc: "Savory house smoked ham paired beautifully with sweet tropical juicy pineapple cubes." },
            sq: { name: "Picë Havaji", desc: "Urshkë e tymosur e shijshme e kombinuar bukur me kubikë të lëngshëm ananasi tropikal." }
        },
        {
            id: 5,
            category: "pizza",
            price: 18.00,
            img: "https://images.unsplash.com/photo-1534308983496-4fabb1a015ee?w=500",
            en: { name: "Meat Lovers Pizza", desc: "A robust blend of spicy pepperoni, seasoned Italian sausage, crispy bacon pieces, and ham." },
            sq: { name: "Picë për Adhuruesit e Mishit", desc: "Një kombinim i fuqishëm i peperonit, salsiçeve italiane, copëzave të proshutës dhe urshkës." }
        },
        {
            id: 6,
            category: "side",
            price: 5.00,
            img: "https://aflavorfulbite.com/wp-content/uploads/2025/09/homemade-buttery-garlic-breadsticks-900x1200-3.jpg",
            en: { name: "Garlic Breadsticks", desc: "Fresh golden baked pastry infused with herbed garlic butter served with hot marinara." },
            sq: { name: "Shkopinj Buke me Hudhrat", desc: "Shkopinj buke të sapopjekur me gjalpë hudhre dhe erëza, të shoqëruar me salcë marinara." }
        },
        {
            id: 7,
            category: "side",
            price: 6.00,
            img: "https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=500",
            en: { name: "BBQ Chicken Wings", desc: "Jumbo crispy chicken wings deeply glazed in delicious rich sweet wood-smoked barbecue sauce." },
            sq: { name: "Krahë Pule me BBQ", desc: "Krahë pule të mëdhenj e krokantë të lyer me salcë barbecue të ëmbël dhe të pasur me tym lisi." }
        },
        {
            id: 8,
            category: "drink",
            price: 2.50,
            img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=500",
            en: { name: "Coca-Cola Classic", desc: "Perfectly chilled premium carbonated sweet original refreshingly crisp beverage." },
            sq: { name: "Koka-Kola Klasike", desc: "Pije gazuar freskuese, e ftohur në mënyrë perfekte me shije origjinale." }
        }
    ];

    const UIStrings = {
        en: {
            "nav-home": "Home",
            "nav-about": "About",
            "nav-menu": "Menu",
            "nav-offers": "Offers",
            "nav-location": "Location",
            "nav-contact": "Contact",
            "nav-login": "Login",
            "nav-order": "Order",
            "hero-heading": "Our Premium Menu",
            "cat-all": "All Items",
            "cat-pizzas": "Pizzas",
            "cat-sides": "Sides",
            "cat-drinks": "Drinks",
            "float-basket": "Basket:",
            "btn-add": "Add to Order",
            "dark-btn": "Toggle Dark Mode",
            "footer-desc": "Fresh Ingredients • Artisan Recipes • Fast Hot Delivery",
            "toast-added": "Added to your basket compilation layout!"
        },
        sq: {
            "nav-home": "Ballina",
            "nav-about": "Rreth Nesh",
            "nav-menu": "Menuja",
            "nav-offers": "Ofertat",
            "nav-location": "Lokacioni",
            "nav-contact": "Kontakt",
            "nav-login": "Kyçuni",
            "nav-order": "Porosit",
            "hero-heading": "Menuja Jonë Premium",
            "cat-all": "Të Gjitha",
            "cat-pizzas": "Picat",
            "cat-sides": "Shtesat",
            "cat-drinks": "Pijet",
            "float-basket": "Shporta:",
            "btn-add": "Shto në Porosi",
            "dark-btn": "Ndrysho Pamjen",
            "footer-desc": "Përbërës të Freskët • Receta Artizane • Dërgesë e Shpejtë dhe e Ngrohtë",
            "toast-added": "U shtua me sukses në shportën tuaj!"
        }
    };

    let currentLang = 'en';
    let activeCategory = 'all';
    let cartCount = 0;

    function renderMenu() {
        const wrapper = document.getElementById("menu-wrapper");
        wrapper.innerHTML = "";

        const filtered = menuData.filter(item => activeCategory === 'all' || item.category === activeCategory);

        filtered.forEach(item => {
            const card = document.createElement("div");
            card.className = "menu-card";
            
            const localized = item[currentLang];
            const btnText = UIStrings[currentLang]["btn-add"];

            card.innerHTML = `
                <img src="${item.img}" alt="${localized.name}" class="menu-img" loading="lazy">
                <div class="menu-info">
                    <h3>${localized.name}</h3>
                    <p class="menu-desc">${localized.desc}</p>
                    <div class="menu-footer">
                        <span class="menu-price">$${item.price.toFixed(2)}</span>
                        <button class="add-btn" onclick="addToCart()">${btnText}</button>
                    </div>
                </div>
            `;
            wrapper.appendChild(card);
        });
    }

    function filterCategory(event, cat) {
        activeCategory = cat;
        
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        
        const eventBtn = event.currentTarget;
        if(eventBtn) {
            eventBtn.classList.add('active');
            eventBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        renderMenu();
    }

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'sq' : 'en';
        document.querySelector('.lang-btn').textContent = currentLang === 'en' ? 'Shqip' : 'English';
        document.documentElement.lang = currentLang;

        document.querySelectorAll('[data-key]').forEach(elem => {
            const key = elem.getAttribute('data-key');
            if (UIStrings[currentLang][key]) {
                elem.textContent = UIStrings[currentLang][key];
            }
        });

        renderMenu();
    }

    function addToCart() {
        cartCount++;
        document.getElementById("cart-counter").textContent = cartCount;
        console.log(UIStrings[currentLang]["toast-added"]);
    }

    function toggleDarkMode() {
        document.body.classList.toggle("dark");
    }

    renderMenu();
</script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c62828">
</body>
</html>

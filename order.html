<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizza Paradise - Place Your Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #d32f2f;
            --primary-hover: #b71c1c;
            --accent: #ffb300;
            --accent-hover: #ffa000;
            --dark-bg: #121212;
            --dark-card: #1e1e1e;
            --light-bg: #f8f9fa;
            --light-card: #ffffff;
            --text-light: #212529;
            --text-muted: #6c757d;
            --border-color: #e0e0e0;
            --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--light-bg);
            color: var(--text-light);
            transition: var(--transition);
            line-height: 1.5;
        }

        /* Top Navigation Header */
        header {
            background: var(--primary);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-container {
            width: 100%;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 6px;
            overflow-x: auto;
            overflow-y: hidden;
            width: 100%;
            padding-bottom: 4px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        nav ul::-webkit-scrollbar {
            display: none;
        }

        nav ul li {
            flex: 0 0 auto;
        }

        nav ul li a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 700;
            font-size: 14px;
            transition: var(--transition);
            padding: 6px 12px;
            border-radius: 20px;
            display: block;
            white-space: nowrap;
        }

        nav ul li a:hover, nav ul li a.active {
            color: white;
            background: rgba(255, 255, 255, 0.2);
        }

        /* Language Toggle Module */
        .lang-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            min-height: 36px;
            display: flex;
            align-items: center;
            transition: var(--transition);
        }

        .lang-btn:hover {
            background: white;
            color: var(--primary);
        }

        /* Hero Splash Header */
        .hero {
            height: 20vh;
            min-height: 140px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('https://images.unsplash.com/photo-1513104890138-7c749659a591');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 0 16px;
        }

        .hero h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Form Content Container Layout */
        .container {
            width: 100%;
            margin: 24px auto;
            padding: 0 16px;
        }

        .order-box {
            background: var(--light-card);
            padding: 24px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.05);
            transition: var(--transition);
        }

        .order-box h2 {
            margin: 24px 0 16px;
            color: var(--primary);
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
        }

        .order-box h2:first-of-type {
            margin-top: 0;
        }

        /* Form Component Fieldsets */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--light-bg);
            color: var(--text-light);
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            transition: var(--transition);
            outline: none;
            min-height: 44px; /* Native touch target sizing */
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            background-color: var(--light-card);
            box-shadow: 0 0 0 4px rgba(211, 47, 47, 0.1);
        }

        .form-group textarea {
            height: 90px;
            resize: none;
        }

        /* Interactive Checkout Summary Dashboard */
        .summary {
            margin-top: 24px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 12px;
            border: 1px dashed var(--border-color);
            transition: var(--transition);
        }

        .summary h3 {
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: 700;
        }

        .summary p {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14.5px;
        }

        .total {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
        }

        .total span {
            font-variant-numeric: tabular-nums;
        }

        /* Primary Action Matrix */
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            margin-top: 24px;
            min-height: 48px;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.2);
        }

        .btn:active {
            background: var(--primary-hover);
            transform: scale(0.98);
        }

        /* System Interface Tone Management controls */
        .controls {
            text-align: center;
            background: #161616;
            padding: 30px 16px;
            margin-top: 40px;
        }

        .mode-btn {
            background: transparent;
            color: #aaa;
            border: 1px solid #333;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            min-height: 44px;
            transition: var(--transition);
            width: 100%;
            max-width: 250px;
        }

        footer {
            background: #0b0b0b;
            color: #aaa;
            text-align: center;
            padding: 30px 16px;
            border-top: 1px solid #1f1f1f;
        }

        footer h3 {
            color: white;
            margin-bottom: 8px;
            font-size: 18px;
        }

        footer p {
            font-size: 12px;
            line-height: 1.4;
        }

        /* High contrast Native Dark Mode properties */
        body.dark {
            background: var(--dark-bg);
            color: #f8f9fa;
            --border-color: #333;
        }

        body.dark .order-box {
            background: var(--dark-card);
            border-color: rgba(255,255,255,0.05);
        }

        body.dark .form-group input,
        body.dark .form-group select,
        body.dark .form-group textarea {
            background-color: #161616;
            color: white;
        }

        body.dark .form-group input:focus,
        body.dark .form-group select:focus,
        body.dark .form-group textarea:focus {
            background-color: var(--dark-card);
        }

        body.dark .summary {
            background: rgba(255, 255, 255, 0.02);
        }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="nav-top">
            <a href="index.html" class="logo">🍕 Pizza Paradise</a>
            <button class="lang-btn" onclick="toggleLanguage()">Shqip</button>
        </div>
        <div class="nav-container">
            <ul>
                <li><a href="index.html" data-key="nav-home">Home</a></li>
                <li><a href="about.html" data-key="nav-about">About</a></li>
                <li><a href="menu.html" data-key="nav-menu">Menu</a></li>
                <li><a href="offers.html" data-key="nav-offers">Offers</a></li>
                <li><a href="location.html" data-key="nav-location">Location</a></li>
                <li><a href="contact.html" data-key="nav-contact">Contact</a></li>
                <li><a href="login.html" data-key="nav-login">Login</a></li>
                <li><a href="order.html" class="active" data-key="nav-order">Order</a></li>
            </ul>
        </div>
    </nav>
</header>

<section class="hero">
    <h1 data-key="hero-heading">Order Your Pizza</h1>
</section>

<div class="container">
    <div class="order-box">
        <h2 data-key="section-cust-info">Customer Information</h2>

        <div class="form-group">
            <label data-key="lbl-name">Full Name</label>
            <input type="text" id="name">
        </div>

        <div class="form-group">
            <label data-key="lbl-email">Email</label>
            <input type="email" id="email">
        </div>

        <div class="form-group">
            <label data-key="lbl-phone">Phone Number</label>
            <input type="tel" id="phone">
        </div>

        <div class="form-group">
            <label data-key="lbl-address">Delivery Address</label>
            <textarea id="address"></textarea>
        </div>

        <h2 data-key="section-select-pizza">Select Pizza</h2>

        <div class="form-group">
            <label data-key="lbl-pizza-type">Pizza Type</label>
            <select id="pizza" onchange="calculateTotal()">
                </select>
        </div>

        <div class="form-group">
            <label data-key="lbl-quantity">Quantity</label>
            <input type="number" id="quantity" value="1" min="1" oninput="calculateTotal()">
        </div>

        <div class="summary">
            <h3 data-key="summary-title">Order Summary</h3>
            <p><span data-key="sum-price">Pizza Price:</span> <span>$<span id="price">0.00</span></span></p>
            <p><span data-key="sum-qty">Quantity:</span> <span id="qty">1</span></p>
            <div class="total">
                <span data-key="sum-total">Total:</span>
                <span>$<span id="total">0.00</span></span>
            </div>
        </div>

        <button class="btn" onclick="placeOrder()" data-key="btn-place">Place Order</button>
    </div>
</div>

<div class="controls">
    <button class="mode-btn" onclick="toggleDarkMode()" data-key="dark-btn">Toggle Dark Mode</button>
</div>

<footer>
    <h3>Pizza Paradise © 2026</h3>
    <p data-key="footer-desc">Fresh Pizza • Fast Delivery • Premium Quality</p>
</footer>

<script>
    // Universal Localization Storage Matrix 
    const translations = {
        en: {
            "nav-home": "Home",
            "nav-about": "About",
            "nav-menu": "Menu",
            "nav-offers": "Offers",
            "nav-location": "Location",
            "nav-contact": "Contact",
            "nav-login": "Login",
            "nav-order": "Order",
            "hero-heading": "Order Your Pizza",
            "section-cust-info": "Customer Information",
            "lbl-name": "Full Name",
            "lbl-email": "Email",
            "lbl-phone": "Phone Number",
            "lbl-address": "Delivery Address",
            "section-select-pizza": "Select Pizza",
            "lbl-pizza-type": "Pizza Type",
            "lbl-quantity": "Quantity",
            "summary-title": "Order Summary",
            "sum-price": "Pizza Price:",
            "sum-qty": "Quantity:",
            "sum-total": "Total:",
            "btn-place": "Place Order",
            "dark-btn": "Toggle Dark Mode",
            "footer-desc": "Fresh Pizza • Fast Delivery • Premium Quality",
            "err-missing": "Please fill all fields.",
            "success-order": "Order Placed Successfully!\n\nThank you for choosing Pizza Paradise.",
            pizzas: [
                { value: "10", name: "Cheese Pizza - $10" },
                { value: "12", name: "Pepperoni Pizza - $12" },
                { value: "15", name: "BBQ Chicken Pizza - $15" },
                { value: "14", name: "Hawaiian Pizza - $14" },
                { value: "18", name: "Meat Lovers Pizza - $18" }
            ]
        },
        sq: {
            "nav-home": "Ballina",
            "nav-about": "Rreth Nesh",
            "nav-menu": "Menuja",
            "nav-offers": "Ofertat",
            "nav-location": "Lokacioni",
            "nav-contact": "Kontakt",
            "nav-login": "Kyçuni",
            "nav-order": "Porosit",
            "hero-heading": "Porosit Picën Tënd",
            "section-cust-info": "Informatat e Klientit",
            "lbl-name": "Emri i Plotë",
            "lbl-email": "Email Adresa",
            "lbl-phone": "Numri i Telefonit",
            "lbl-address": "Adresa e Dërgesës",
            "section-select-pizza": "Zgjidh Picën",
            "lbl-pizza-type": "Lloji i Picës",
            "lbl-quantity": "Sasia",
            "summary-title": "Përmbledhja e Porosisë",
            "sum-price": "Çmimi i Picës:",
            "sum-qty": "Sasia:",
            "sum-total": "Totali:",
            "btn-place": "Dërgo Porosinë",
            "dark-btn": "Ndrysho Pamjen",
            "footer-desc": "Pica e Freskët • Dërgesë e Shpejtë • Cilësi Premium",
            "err-missing": "Ju lutem plotësoni të gjitha fushat.",
            "success-order": "Porosia u dërgua me sukses!\n\nJu faleminderit që zgjodhët Pizza Paradise.",
            pizzas: [
                { value: "10", name: "Picë me Djathë - $10" },
                { value: "12", name: "Picë Peperoni - $12" },
                { value: "15", name: "Picë BBQ me Pulë - $15" },
                { value: "14", name: "Picë Havaji - $14" },
                { value: "18", name: "Picë për Adhuruesit e Mishit - $18" }
            ]
        }
    };

    let currentLang = 'en';

    function renderPizzaDropdown() {
        const pizzaSelect = document.getElementById("pizza");
        const currentSelectedValue = pizzaSelect.value || translations[currentLang].pizzas[0].value;
        
        pizzaSelect.innerHTML = "";
        translations[currentLang].pizzas.forEach(pizza => {
            const opt = document.createElement("option");
            opt.value = pizza.value;
            opt.textContent = pizza.name;
            if (pizza.value === currentSelectedValue) {
                opt.selected = true;
            }
            pizzaSelect.appendChild(opt);
        });
    }

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'sq' : 'en';
        document.querySelector('.lang-btn').textContent = currentLang === 'en' ? 'Shqip' : 'English';
        document.documentElement.lang = currentLang;
        
        document.querySelectorAll('[data-key]').forEach(elem => {
            const key = elem.getAttribute('data-key');
            if (translations[currentLang][key]) {
                elem.textContent = translations[currentLang][key];
            }
        });

        renderPizzaDropdown();
        calculateTotal();
    }

    function calculateTotal() {
        let pizzaPrice = parseFloat(document.getElementById("pizza").value) || 0;
        let quantity = parseInt(document.getElementById("quantity").value) || 1;
        
        if (quantity < 1) {
            quantity = 1;
            document.getElementById("quantity").value = 1;
        }

        let total = pizzaPrice * quantity;

        document.getElementById("price").innerText = pizzaPrice.toFixed(2);
        document.getElementById("qty").innerText = quantity;
        document.getElementById("total").innerText = total.toFixed(2);
    }

    function placeOrder() {
        let name = document.getElementById("name").value.trim();
        let email = document.getElementById("email").value.trim();
        let phone = document.getElementById("phone").value.trim();
        let address = document.getElementById("address").value.trim();

        if (name === "" || email === "" || phone === "" || address === "") {
            alert(translations[currentLang]["err-missing"]);
            return;
        }

        alert(translations[currentLang]["success-order"]);
    }

    function toggleDarkMode() {
        document.body.classList.toggle("dark");
    }

    // Initialization Sequence
    renderPizzaDropdown();
    calculateTotal();
</script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c62828">
</body>
</html>
